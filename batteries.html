<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>البطاريات</title>

<style>

body{
font-family:Tahoma;
background:#f2f2f2;
margin:0;
text-align:center;
}

h1{
background:#0d1b2a;
color:white;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

.card img{
width:100%;
}

</style>

</head>

<body>

<h1>بطاريات الليثيوم</h1>

<div class="grid">

<div class="card">
<img src="battery1.jpg">
<p>بطارية ليثيوم 5KW</p>
</div>

<div class="card">
<img src="battery2.jpg">
<p>بطارية ليثيوم 10KW</p>
</div>

<div class="card">
<img src="battery3.jpg">
<p>بطارية ليثيوم 16KW</p>
</div>

</div>

</body>
</html>
