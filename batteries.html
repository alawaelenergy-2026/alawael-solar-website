<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>البطاريات</title>
<style>
    body { font-family: Arial; text-align: center; direction: rtl; margin: 20px; }
    .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .device { width: 200px; }
    .device img { width: 100%; border: 1px solid #ccc; border-radius: 8px; }
    .device-name { margin-top: 5px; font-weight: bold; }
</style>
</head>
<body>

<h1>البطاريات</h1>

<div class="grid">

  <div class="device">
    <img src="batteries_images/BOS.jpg.jpeg" alt="BOS">
    <div class="device-name">BOS</div>
  </div>

  <div class="device">
    <img src="batteries_images/SE-F5.jpg.jpeg" alt="SE-F5">
    <div class="device-name">SE-F5</div>
  </div>

  <div class="device">
    <img src="batteries_images/SE-F16.jpg.jpeg" alt="SE-F16">
    <div class="device-name">SE-F16</div>
  </div>

  <div class="device">
    <img src="batteries_images/hithium-16k-battery.jpg.jpeg" alt="Hithium 16K">
    <div class="device-name">Hithium 16K</div>
  </div>

</div>

</body>
</html>
