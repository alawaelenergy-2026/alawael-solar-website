<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>شركة الأوائل للطاقة الشمسية</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 0;
    text-align: center;
  }

  /* Header */
  header {
    background-color: #004d99;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 30px;
  }

  header img {
    height: 60px;
  }

  .contact {
    text-align: right;
    line-height: 1.5;
    font-size: 16px;
  }

  /* Main */
  main {
    margin: 40px 20px 80px 20px;
  }

  h1 {
    margin-bottom: 20px;
  }

  .sections {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 30px;
    margin-top: 30px;
  }

  .card {
    background-color: white;
    width: 200px;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  .card a {
    text-decoration: none;
    color: #004d99;
    font-weight: bold;
    display: block;
    margin-top: 10px;
    font-size: 18px;
  }

  /* Footer */
  footer {
    background-color: #004d99;
    color: white;
    padding: 15px;
    position: fixed;
    width: 100%;
    bottom: 0;
    line-height: 1.6;
  }

</style>
</head>
