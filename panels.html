<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الواح الطاقة الشمسية</title>
<style>
    body { font-family: Arial; text-align: center; direction: rtl; margin: 20px; }
    h1 { margin-bottom: 30px; }
    .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .device { width: 200px; }
    .device img { width: 100%; border: 1px solid #ccc; border-radius: 8px; }
    .device-name { margin-top: 5px; font-weight: bold; }
</style>
</head>
<body>

<h1>الواح الطاقة الشمسية</h1>
<div class="grid">
  <div class="device">
    <img src="panels_images/jinko-solar.jpg.jpeg" alt="Jinko Solar">
    <div class="device-name">Jinko Solar</div>
  </div>
</div>

</body>
</html>
